ID: hook-test
_schema-version: "3.3.0"
version: 0.1.7

modules:
  - name: my-module
    type: application
    path: appBits.zip

    hooks:
      - name: default-behavior-hook
        type: task
        phases:
          - blue-green.application.after-stop.live
        parameters:
          command: "echo Executing hook on live application"

      - name: target-app-test
        type: task
        phases:
          - blue-green.application.after-stop.live
        parameters:
          command: "echo Executing hook on idle application"
          phases-config:
            - phase: blue-green.application.after-stop.live
              target-app: idle

